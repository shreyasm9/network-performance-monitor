<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        form {
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<h1>Register</h1>

<form method="POST">
    <input type="text" name="username" placeholder="Enter Username" required><br>
    <input type="password" name="password" placeholder="Enter Password" required><br>
    <button type="submit">Register</button>
</form>

<a href="/">Already have account? Login</a>

</body>
</html>
